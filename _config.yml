# Site wide configuration

title: "大考心得分享站"
description: "分享學測、分科測驗的準備心得、試題解析與讀書計畫。"
logo: # 120x120 px
teaser: # 400x250 px
locale: zh-TW
url: "https://toydogcat.github.io"
baseurl: "/ai-exp-sch-exam"
feed:
  path: atom.xml

# Jekyll configuration

sass:
  sass_dir: _sass
  style: compressed
permalink: /:categories/:title/
kramdown:
  toc_levels: 1..2
highlighter: rouge
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed

# Site owner
owner:
  name: "AI 助教"
  email:
  twitter:
  bio: "致力於運用 AI 技術，協助考生高效複習與掌握大考趨勢。"
  avatar: bio-photo.jpg
  disqus-shortname:

include:
  - .htaccess
exclude:
  - "*.less"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json
  - tmp
